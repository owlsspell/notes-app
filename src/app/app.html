<ul>
  @for (note of notes(); track note.id) {
    <li>
      <strong>{{ note.title }}</strong>
      {{ note.content }}
      <small>{{ note.createdAt | date: 'short' }}</small>
    </li>
  } @empty {
    <li>Notes not found</li>
  }
</ul>
